<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-rose-50 to-pink-100">
  <div class="bg-white rounded-2xl shadow-xl p-10 w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800">Benvenuta 🎓</h1>
      <p class="text-gray-500 mt-2">Accedi per vedere le conferme di presenza</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-gray-700">Email</label>
        <input
          pInputText
          type="email"
          formControlName="email"
          placeholder="la-tua-email@esempio.com"
          class="w-full"
        />
        @if (form.controls.email.invalid && form.controls.email.touched) {
          <small class="text-red-500">Email non valida</small>
        }
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-gray-700">Password</label>
        <p-password
          formControlName="password"
          placeholder="La tua password"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
        />
        @if (form.controls.password.invalid && form.controls.password.touched) {
          <small class="text-red-500">Password obbligatoria</small>
        }
      </div>

      <p-button
        type="submit"
        label="Accedi"
        [loading]="authStore.loading()"
        styleClass="w-full mt-2"
        severity="contrast"
      />
    </form>
  </div>
</div>
