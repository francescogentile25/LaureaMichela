<div class="page-bg">
  <div class="card">

    <!-- Cerchi riempiti angoli -->
    <div class="blob blob--tl"></div>
    <div class="blob blob--tr"></div>
    <div class="blob blob--bl"></div>
    <div class="blob blob--br"></div>

    <!-- Archi outline sottili -->
    <svg class="arc arc--tr" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="0" cy="120" r="100" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
    </svg>
    <svg class="arc arc--bl" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="120" cy="0" r="100" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
    </svg>

    <!-- Contenuto -->
    <div class="inner">

      <!-- Cappello laurea -->
      <div class="cap-wrap">
        <svg class="cap" viewBox="0 0 90 68" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Tavola piatta -->
          <polygon points="45,4 86,22 45,40 4,22" fill="white"/>
          <!-- Corpo cilindrico -->
          <path d="M20 28 L20 46 Q20 58 45 58 Q70 58 70 46 L70 28" fill="white" opacity="0.72"/>
          <!-- Stringa fiocco -->
          <line x1="86" y1="22" x2="86" y2="40" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <!-- Nappina -->
          <circle cx="86" cy="43" r="3.5" fill="white"/>
          <line x1="86" y1="46" x2="86" y2="54" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="82" y1="54" x2="90" y2="54" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>

      <!-- MASTER IN -->
      <p class="label-master">Master in</p>

      <!-- Titolo corso -->
      <h1 class="title-degree">
        Organizzazione e Gestione<br>delle Risorse Umane
      </h1>

      <!-- Frase corsiva -->
      <p class="subtitle-italic">Ti aspetto per festeggiare con me</p>

      <!-- Divisore -->
      <div class="divider"></div>

      <!-- Info evento -->
      <ul class="info-list">
        <li class="info-row">
          <!-- Calendario -->
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2.5"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
            <rect x="7" y="14" width="3" height="3" rx="0.5" fill="currentColor" stroke="none" opacity="0.6"/>
          </svg>
          <span>Sabato 16 Maggio</span>
        </li>
        <li class="info-row">
          <!-- Orologio -->
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <polyline points="12 7 12 12 15.5 14.5"/>
          </svg>
          <span>ore 20:30</span>
        </li>
        <li class="info-row">
          <!-- Pin -->
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2C8.68 2 6 4.68 6 8c0 4.5 6 12 6 12s6-7.5 6-12c0-3.32-2.68-6-6-6z"/>
            <circle cx="12" cy="8" r="2.2"/>
          </svg>
          <span>A casa di Nonna</span>
        </li>
      </ul>

      <!-- Nome -->
      <p class="name">Michela</p>

      <!-- Fiore -->
      <svg class="flower" viewBox="0 0 50 70" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Petali -->
        <ellipse cx="25" cy="13" rx="4" ry="8" fill="none" stroke="white" stroke-width="1.2" opacity="0.8"/>
        <ellipse cx="25" cy="13" rx="4" ry="8" fill="none" stroke="white" stroke-width="1.2" opacity="0.8" transform="rotate(45 25 25)"/>
        <ellipse cx="25" cy="13" rx="4" ry="8" fill="none" stroke="white" stroke-width="1.2" opacity="0.8" transform="rotate(90 25 25)"/>
        <ellipse cx="25" cy="13" rx="4" ry="8" fill="none" stroke="white" stroke-width="1.2" opacity="0.8" transform="rotate(135 25 25)"/>
        <ellipse cx="25" cy="13" rx="4" ry="8" fill="none" stroke="white" stroke-width="1.2" opacity="0.8" transform="rotate(180 25 25)"/>
        <ellipse cx="25" cy="13" rx="4" ry="8" fill="none" stroke="white" stroke-width="1.2" opacity="0.8" transform="rotate(225 25 25)"/>
        <ellipse cx="25" cy="13" rx="4" ry="8" fill="none" stroke="white" stroke-width="1.2" opacity="0.8" transform="rotate(270 25 25)"/>
        <ellipse cx="25" cy="13" rx="4" ry="8" fill="none" stroke="white" stroke-width="1.2" opacity="0.8" transform="rotate(315 25 25)"/>
        <!-- Centro -->
        <circle cx="25" cy="25" r="4.5" fill="none" stroke="white" stroke-width="1.2" opacity="0.8"/>
        <!-- Stelo -->
        <line x1="25" y1="30" x2="25" y2="58" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
        <!-- Foglia -->
        <path d="M25 46 Q18 42 16 36" stroke="white" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.8"/>
      </svg>

      <!-- Bottone -->
      <button class="btn-conferma" (click)="conferma.emit()">
        Conferma la tua presenza ✨
      </button>

    </div>
  </div>
</div>
