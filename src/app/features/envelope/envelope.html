<div class="page-bg">

  <div class="envelope-scene">

    <div class="blob blob--tl"></div>
    <div class="blob blob--tr"></div>
    <div class="blob blob--bl"></div>
    <div class="blob blob--br"></div>

    <div class="scene-center">

      <div class="envelope" (pointerdown)="onEnvelopePointerDown($event)">

        <!-- Back face (shows through top-center triangle when flap opens) -->
        <div class="env-back"></div>

        <!-- Letter slides up from inside -->
        <div class="letter" #letter>
          <p class="letter-name">Michela</p>
          <div class="letter-divider"></div>
          <p class="letter-tagline">ti aspetto per festeggiare</p>
        </div>

        <!-- Front fold panels: create the classic envelope diamond seam lines -->
        <div class="env-panel env-left"></div>
        <div class="env-panel env-right"></div>
        <div class="env-panel env-bottom-tri"></div>

        <!-- Flap with small wax-seal dot -->
        <div class="env-flap" #flap>
          <div class="flap-seal"></div>
        </div>

      </div>

      <div class="hint-area">
        @if (isTouchDevice()) {
          <p class="hint-text">↑ scorri su per aprire</p>
        } @else {
          <p class="hint-text">clicca per aprire</p>
        }
      </div>

    </div>

  </div>

</div>
