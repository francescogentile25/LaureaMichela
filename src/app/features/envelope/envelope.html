<div class="page-bg">

  <div class="envelope-scene">

    <div class="blob blob--tl"></div>
    <div class="blob blob--tr"></div>
    <div class="blob blob--bl"></div>
    <div class="blob blob--br"></div>

    <div class="scene-center">

      <!-- Square envelope — mirrors the original CodePen structure -->
      <div class="envelope" #envelopeEl
           (pointerdown)="onEnvelopePointerDown($event)">

        <!-- Letter card sits inside the envelope body -->
        <div class="env-card" #letter>
          <p class="letter-name">Michela</p>
          <div class="letter-divider"></div>
          <p class="letter-tagline">ti aspetto per festeggiare</p>
        </div>

        <!-- Outer flap: clips the diamond shape, rotates on X to open -->
        <div class="flap-container flap-outer" #flapOuter>
          <div class="flap">
            <!-- darker inside face shown when flap folds over -->
            <div class="flap-inner-face"></div>
          </div>
        </div>

        <!-- Inner flap: permanently rotated 180°, visible when outer flap opens -->
        <div class="flap-container flap-inner">
          <div class="flap"></div>
        </div>

        <!-- Ribbon bow: splits apart as the flap opens -->
        <svg class="env-bow" #bow
             viewBox="0 0 220 70" fill="none"
             xmlns="http://www.w3.org/2000/svg">
          <!-- left half of bow -->
          <g id="bow-left">
            <path d="M110 35 Q80 12 25 8"  stroke="rgba(255,255,255,0.65)" stroke-width="5" stroke-linecap="round"/>
            <path d="M110 35 Q80 58 25 62" stroke="rgba(255,255,255,0.65)" stroke-width="5" stroke-linecap="round"/>
            <ellipse cx="68" cy="35" rx="24" ry="16"
                     stroke="rgba(255,255,255,0.72)" stroke-width="4"
                     fill="rgba(255,255,255,0.10)"
                     transform="rotate(-8 68 35)"/>
          </g>
          <!-- right half of bow -->
          <g id="bow-right">
            <path d="M110 35 Q140 12 195 8"  stroke="rgba(255,255,255,0.65)" stroke-width="5" stroke-linecap="round"/>
            <path d="M110 35 Q140 58 195 62" stroke="rgba(255,255,255,0.65)" stroke-width="5" stroke-linecap="round"/>
            <ellipse cx="152" cy="35" rx="24" ry="16"
                     stroke="rgba(255,255,255,0.72)" stroke-width="4"
                     fill="rgba(255,255,255,0.10)"
                     transform="rotate(8 152 35)"/>
          </g>
          <!-- central knot -->
          <circle cx="110" cy="35" r="8" fill="rgba(255,255,255,0.88)"/>
        </svg>

      </div>

      <!-- Interaction hint -->
      <div class="hint-area">
        @if (isTouchDevice()) {
          <p class="hint-text">↑ scorri su per aprire</p>
        } @else {
          <p class="hint-text">clicca per aprire</p>
        }
      </div>

    </div>

  </div>

</div>
