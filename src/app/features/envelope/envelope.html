<div class="page-bg">

  <div class="envelope-scene">

    <div class="blob blob--tl"></div>
    <div class="blob blob--tr"></div>
    <div class="blob blob--bl"></div>
    <div class="blob blob--br"></div>

    <div class="scene-center">

      <div class="env-wrapper" (pointerdown)="onEnvelopePointerDown($event)">

        <!-- Shadow + body background -->
        <div class="env-base"></div>

        <!-- Letter card (starts hidden behind base/svg) -->
        <div class="env-card" #letter>
          <p class="letter-name">Michela</p>
          <div class="letter-divider"></div>
          <p class="letter-tagline">ti aspetto per festeggiare</p>
        </div>

        <!-- SVG: left and right triangular fold panels -->
        <svg class="env-svg" viewBox="0 0 660 290" fill="none" aria-hidden="true" preserveAspectRatio="none">
          <path d="M330 145 L0 290 L0 0 Z"   fill="#5D5790"/>
          <path d="M330 145 L660 290 L660 0 Z" fill="#555084"/>
        </svg>

        <!-- Flap: downward-pointing triangle, rotates backward to open -->
        <div class="env-flap" #flap></div>

      </div>

      <div class="hint-area">
        @if (isTouchDevice()) {
          <p class="hint-text">↑ scorri su per aprire</p>
        } @else {
          <p class="hint-text">clicca per aprire</p>
        }
      </div>

    </div>

  </div>

</div>
